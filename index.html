出力はJSONのみ。</textarea>

        <textarea id="prompt-trend" spellcheck="false">下記のレース傾向PDFを解析し、過去のレース結果に基づいて各項目のスコアを算出してください。

【重要】
各カテゴリーについて、過去の成績データから以下のスコアを計算してください：
- 得票数が多い＝高スコア（+20～+25点）
- 得票数が少ない＝低スコア（-15～-20点）
- 中程度＝0点～±5点

【出力形式】
{
  "jockey": {"騎手1": 20, "騎手2": 15, ...},
  "sire": {"種牡馬1": 18, "種牡馬2": 12, ...},
  "age": {"2": -20, "3": -5, "4": 10, "5": 8, ...},
  "kyakushitsu": {"逃げ": -10, "先行": 5, "差し": 15, "追い込み": 0, "自在": 0},
  "ninki": {"1": 5, "2": 4, "3": 3, ...},
  "maejun": {"1": 10, "2": 8, "3": 5, ...},
  "maeclass": {"GI": 10, "GII": 6, "GIII": 4, "L": 0, "OP": -2, "3勝": -3, "2勝": -5, "1勝": -8},
  "waku": {"1": 0, "2": 0, "3": 0, "4": 5, "5": 5, "6": 5, "7": 0, "8": -5},
  "timdev": {"0～": -20, "35～": -15, "40～": -10, "45～": -5, "50～": 0, "55～": 3, "60～": 5, "65～": 10, "70～": 15, "75～": 20}
}

【各カテゴリーの説明】
- jockey: 騎手ごとのスコア（ルメール、岩田望、川田など）
- sire: 種牡馬ごとのスコア（ディープインパクト、キタサンブラックなど）
- age: 馬の年齢ごと（2歳～8歳）のスコア
- kyakushitsu: 脚質ごと（逃げ、先行、差し、追い込み、自在）のスコア
- ninki: 単勝人気ごと（1番人気～18番人気）のスコア
- maejun: 前走着順ごと（1着～12着）のスコア
- maeclass: 前走レースクラスごと（GI、GII、GIII、L、OP、3勝、2勝、1勝）のスコア
- waku: 枠順ごと（1枠～8枠）のスコア
- timdev: タイム偏差値ごと（0～、35～、40～、45～、50～、55～、60～、65～、70～、75～）のスコア

【出力時の注意】
各スコアを付与した理由を、データから見えることとして簡潔に説明してください。
例：
"jockey": {"ルメール": 25 /* 過去5年の優勝率45%、データセット内での連対率60% */}
"age": {"3": -5 /* 3歳馬は経験不足で不利、当該レースでの平均着順6.5着 */}
"maeclass": {"GI": 10 /* GI戦経験馬が優勝している傾向、連対率62% */}

【最終出力】
JSONとその下に、各配点の根拠をまとめた説明を記載してください。
説明文は以下の形式で：

《騎手》
- ルメール: +25点 → 理由
- 岩田望: +20点 → 理由
...

《種牡馬》
- ディープインパクト: +20点 → 理由
...

【この形式で出力してください】
{"jockey": {...}, "sire": {...}, ...}

《配点根拠》
[説明文をここに記載]

PDF:</textarea>

<script>
let horses = [];
let records = [];
let db = {};
let savedJsons = {};

function setStatus(msg, type = 'info') {
  const el = document.getElementById('status');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = type;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function switchTo(tab) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'main') renderTable();
  if (tab === 'db') renderDBSection();
  if (tab === 'record') renderRecordList();
  if (tab === 'analysis') renderAnalysis();
}

function copyPrompt(id) {
  const text = document.getElementById(id).value;
  navigator.clipboard.writeText(text).then(() => setStatus('✅ コピー完了', 'ok')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    setStatus('✅ コピー完了', 'ok');
  });
}

function importJSON() {
  try {
    let raw = document.getElementById('json-input').value.trim();
    if (!raw) { setStatus('❌ JSONを貼り付けてください', 'err'); return; }
    
    const jsonStart = raw.indexOf('{');
    const jsonEnd = raw.lastIndexOf('}');
    if (jsonStart < 0 || jsonEnd < 0) { setStatus('❌ JSONが正しくありません', 'err'); return; }
    
    raw = raw.substring(jsonStart, jsonEnd + 1);
    const parsed = JSON.parse(raw);
    const list = parsed.horses || parsed;
    
    if (!Array.isArray(list)) { setStatus('❌ horses配列がありません', 'err'); return; }
    
    // 正規化関数
    const normalizeKyakushitsu = (val) => {
      const map = {'差': '差し', '先': '先行', '逃': '逃げ', '追': '追い込み'};
      return map[val] || String(val || '差し');
    };
    
    const normalizeMaeclass = (val) => {
      const map = {'G1': 'GI', 'G2': 'GII', 'G3': 'GIII', 'Jpn1': 'GI', 'Jpn2': 'GII', 'Jpn3': 'GIII'};
      return map[val] || String(val || '');
    };
    
    horses = list.map((h, i) => ({
      id: Date.now() + i,
      banum: parseInt(h.banum || 0),
      waku: String(h.waku || ''),
      age: String(h.age || ''),
      name: String(h.name || ''),
      jockey: String(h.jockey || ''),
      sire: String(h.sire || ''),
      odds: parseFloat(h.odds || 0),
      kyakushitsu: normalizeKyakushitsu(h.kyakushitsu),
      ninki: String(h.ninki || ''),
      maeclass: normalizeMaeclass(h.maeclass),
      maejun: String(h.maejun || ''),
      timdev: String(h.timdev || ''),
      chokyoFinal: 'B',
      chokyoPrev: 'B',
      comment: '◯'
    }));
    
    document.getElementById('count-badge').textContent = horses.length;
    renderTable();
    setStatus(`✅ ${horses.length}頭を読込`, 'ok');
  } catch (e) {
    setStatus('❌ エラー: ' + e.message.substring(0, 30), 'err');
  }
}

function validateJSON() {
  try {
    const raw = document.getElementById('json-input').value.trim();
    const jsonStart = raw.indexOf('{');
    const jsonEnd = raw.lastIndexOf('}');
    if (jsonStart < 0 || jsonEnd < 0) { setStatus('❌ JSON形式エラー', 'err'); return; }
    const extracted = raw.substring(jsonStart, jsonEnd + 1);
    const parsed = JSON.parse(extracted);
    const list = parsed.horses || parsed;
    if (!Array.isArray(list)) { setStatus('❌ horses配列なし', 'err'); return; }
    setStatus(`✅ OK！${list.length}頭`, 'ok');
  } catch (e) {
    setStatus('❌ JSON形式エラー', 'err');
  }
}

function applyNinki() {
  try {
    const text = document.getElementById('ninki-input').value.trim();
    if (!text) { setStatus('❌ 入力してください', 'err'); return; }
    if (horses.length === 0) { setStatus('❌ 馬を読込してください', 'err'); return; }
    
    const lines = text.split('\n').filter(l => l.trim());
    let count = 0;
    lines.forEach(line => {
      const m = line.match(/(\d+)\s*:\s*(\d+)/);
      if (m) {
        const banum = parseInt(m[1]);
        const ninki = String(m[2]);
        const horse = horses.find(h => h.banum === banum);
        if (horse) { horse.ninki = ninki; count++; }
      }
    });
    if (count > 0) {
      renderTable();
      renderAnalysis();
      setStatus(`✅ ${count}頭の人気を反映`, 'ok');
      document.getElementById('ninki-input').value = '';
    } else {
      setStatus('❌ 反映できた馬がありません', 'err');
    }
  } catch (e) {
    setStatus('❌ エラー: ' + e.message.substring(0, 20), 'err');
  }
}

function applyOdds() {
  try {
    const text = document.getElementById('odds-input').value.trim();
    if (!text) { setStatus('❌ 入力してください', 'err'); return; }
    if (horses.length === 0) { setStatus('❌ 馬を読込してください', 'err'); return; }
    
    const lines = text.split('\n').filter(l => l.trim());
    let count = 0;
    lines.forEach(line => {
      const m = line.match(/(\d+)\s*:\s*([\d.]+)/);
      if (m) {
        const banum = parseInt(m[1]);
        const odds = parseFloat(m[2]);
        const horse = horses.find(h => h.banum === banum);
        if (horse) { horse.odds = odds; count++; }
      }
    });
    if (count > 0) {
      renderTable();
      renderAnalysis();
      setStatus(`✅ ${count}頭のオッズを反映`, 'ok');
      document.getElementById('odds-input').value = '';
    } else {
      setStatus('❌ 反映できた馬がありません', 'err');
    }
  } catch (e) {
    setStatus('❌ エラー: ' + e.message.substring(0, 20), 'err');
  }
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  horses.forEach((h, idx) => {
    const trendScore = (db.jockey?.[h.jockey] || 0) + (db.sire?.[h.sire] || 0) + (db.age?.[h.age] || 0) + (db.kyakushitsu?.[h.kyakushitsu] || 0) + (db.ninki?.[h.ninki] || 0) + (db.maejun?.[h.maejun] || 0) + (db.maeclass?.[h.maeclass] || 0) + (db.waku?.[h.waku] || 0) + (db.timdev?.[h.timdev] || 0);
    const chokyoScore = ({'A': 10, 'B': 0, 'C': -15}[h.chokyoFinal] || 0) + ({'A': 10, 'B': 0, 'C': -15}[h.chokyoPrev] || 0);
    const commentScore = {'◎': 10, '◯': 5, '△': -5, '×': -15}[h.comment] || 0;
    const totalScore = trendScore + chokyoScore + commentScore;
    
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${h.banum}</td>
      <td><input class="inp" style="width: 30px;" value="${h.waku}" onchange="horses[${idx}].waku=this.value; renderTable();"></td>
      <td><strong>${h.name}</strong></td>
      <td><input class="inp" style="width: 30px;" value="${h.age}" onchange="horses[${idx}].age=this.value; renderTable();"></td>
      <td style="font-size: 8px;">${h.jockey}</td>
      <td style="font-size: 8px;">${h.sire}</td>
      <td><select class="sel" style="width: 100%;" onchange="horses[${idx}].kyakushitsu=this.value; renderTable();"><option>-</option><option ${h.kyakushitsu==='逃げ'?'selected':''}>逃げ</option><option ${h.kyakushitsu==='先行'?'selected':''}>先行</option><option ${h.kyakushitsu==='差し'?'selected':''}>差し</option><option ${h.kyakushitsu==='追い込み'?'selected':''}>追い込み</option><option ${h.kyakushitsu==='自在'?'selected':''}>自在</option></select></td>
      <td><input class="inp" style="width: 30px;" value="${h.ninki}" onchange="horses[${idx}].ninki=this.value; renderTable();"></td>
      <td><select class="sel" style="width: 100%;" onchange="horses[${idx}].maejun=this.value; renderTable();"><option>-</option><option ${h.maejun==='1'?'selected':''}>1</option><option ${h.maejun==='2'?'selected':''}>2</option><option ${h.maejun==='3'?'selected':''}>3</option><option ${h.maejun==='4'?'selected':''}>4</option><option ${h.maejun==='5'?'selected':''}>5</option><option ${h.maejun==='6'?'selected':''}>6</option><option ${h.maejun==='7'?'selected':''}>7</option><option ${h.maejun==='8'?'selected':''}>8</option><option ${h.maejun==='9'?'selected':''}>9</option><option ${h.maejun==='10'?'selected':''}>10</option><option ${h.maejun==='11'?'selected':''}>11</option><option ${h.maejun==='12'?'selected':''}>12</option></select></td>
      <td><select class="sel" style="width: 100%;" onchange="horses[${idx}].maeclass=this.value; renderTable();"><option>-</option><option ${h.maeclass==='GI'?'selected':''}>GI</option><option ${h.maeclass==='GII'?'selected':''}>GII</option><option ${h.maeclass==='GIII'?'selected':''}>GIII</option><option ${h.maeclass==='L'?'selected':''}>L</option><option ${h.maeclass==='OP'?'selected':''}>OP</option><option ${h.maeclass==='3勝'?'selected':''}>3勝</option><option ${h.maeclass==='2勝'?'selected':''}>2勝</option><option ${h.maeclass==='1勝'?'selected':''}>1勝</option></select></td>
      <td><select class="sel" style="width: 100%;" onchange="horses[${idx}].timdev=this.value; renderTable();"><option>-</option><option ${h.timdev==='0～'?'selected':''}>0～</option><option ${h.timdev==='35～'?'selected':''}>35～</option><option ${h.timdev==='40～'?'selected':''}>40～</option><option ${h.timdev==='45～'?'selected':''}>45～</option><option ${h.timdev==='50～'?'selected':''}>50～</option><option ${h.timdev==='55～'?'selected':''}>55～</option><option ${h.timdev==='60～'?'selected':''}>60～</option><option ${h.timdev==='65～'?'selected':''}>65～</option><option ${h.timdev==='70～'?'selected':''}>70～</option><option ${h.timdev==='75～'?'selected':''}>75～</option></select></td>
      <td><input class="inp" style="width: 40px;" value="${h.odds.toFixed(1)}" onchange="horses[${idx}].odds=parseFloat(this.value); renderTable();"></td>
      <td><select class="sel" style="width: 100%;" onchange="horses[${idx}].chokyoFinal=this.value; renderTable();"><option ${h.chokyoFinal==='A'?'selected':''}>A</option><option ${h.chokyoFinal==='B'?'selected':''}>B</option><option ${h.chokyoFinal==='C'?'selected':''}>C</option></select></td>
      <td><select class="sel" style="width: 100%;" onchange="horses[${idx}].chokyoPrev=this.value; renderTable();"><option ${h.chokyoPrev==='A'?'selected':''}>A</option><option ${h.chokyoPrev==='B'?'selected':''}>B</option><option ${h.chokyoPrev==='C'?'selected':''}>C</option></select></td>
      <td><select class="sel" style="width: 100%;" onchange="horses[${idx}].comment=this.value; renderTable();"><option ${h.comment==='◎'?'selected':''}>◎</option><option ${h.comment==='◯'?'selected':''}>◯</option><option ${h.comment==='△'?'selected':''}>△</option><option ${h.comment==='×'?'selected':''}>×</option></select></td>
      <td style="font-weight: 900; color: #2563eb;">${Math.round(trendScore)}</td>
      <td style="font-weight: 700; color: #27ae60;">+${chokyoScore}${commentScore>0?'+':''}${commentScore}</td>
      <td style="font-weight: 900; color: #e94560;">${totalScore}</td>
    `;
    tbody.appendChild(row);
  });
}

function loadDBPreset() {
  db = {"jockey": {"ルメール": 25, "岩田望": 20}, "sire": {"ディープインパクト": 20}, "age": {"4": 10}, "kyakushitsu": {"差し": 15}, "ninki": {"1": 5}, "maejun": {"1": 10}, "maeclass": {"GI": 10}, "waku": {"4": 5}, "timdev": {"75～": 20}};
  renderDBSection();
  setStatus('✅ プリセット読込', 'ok');
}

function renderDBSection() {
  const renderKeyValues = (category) => {
    const items = db[category] || {};
    if (Object.keys(items).length === 0) {
      return '<div style="color: #999; font-size: 9px; padding: 8px; background: #f9f9f9; border-radius: 4px;">未設定</div>';
    }
    return Object.entries(items).map(([k, v]) => `
      <div style="display: flex; gap: 4px; margin-bottom: 4px; align-items: center;">
        <input class="inp" style="flex: 1; font-size: 9px;" value="${k}" readonly>
        <input class="inp" style="width: 50px; font-size: 9px;" type="text" value="${v}" onchange="db['${category}']['${k}']=parseInt(this.value); saveDB(); renderTable(); renderAnalysis();">
        <button class="btn btn-red" style="padding: 3px 6px; font-size: 8px;" onclick="delete db['${category}']['${k}']; saveDB(); renderDBSection(); renderTable(); renderAnalysis();">✕</button>
      </div>
    `).join('');
  };
  
  db.ninki = db.ninki || {};
  db.timdev = db.timdev || {};
  
  // 人気と偏差値をプリセット値で初期化
  if (Object.keys(db.ninki).length === 0) {
    db.ninki = {"1": 5, "2": 4, "3": 3, "4": 2, "5": 1, "6": 0, "7": -1, "8": -2};
  }
  if (Object.keys(db.timdev).length === 0) {
    db.timdev = {"0～": -20, "35～": -15, "40～": -10, "45～": -5, "50～": 0, "55～": 3, "60～": 5, "65～": 10, "70～": 15, "75～": 20};
  }
  
  document.getElementById('db-jockey-list').innerHTML = renderKeyValues('jockey');
  document.getElementById('db-sire-list').innerHTML = renderKeyValues('sire');
  document.getElementById('db-kyakushitsu-list').innerHTML = renderKeyValues('kyakushitsu');
  document.getElementById('db-age-list').innerHTML = renderKeyValues('age');
  document.getElementById('db-ninki-list').innerHTML = renderKeyValues('ninki');
  document.getElementById('db-maejun-list').innerHTML = renderKeyValues('maejun');
  document.getElementById('db-maeclass-list').innerHTML = renderKeyValues('maeclass');
  document.getElementById('db-waku-list').innerHTML = renderKeyValues('waku');
  document.getElementById('db-timdev-list').innerHTML = renderKeyValues('timdev');
}

function saveDB() {
  localStorage.setItem('kp_db', JSON.stringify(db));
  setStatus('✅ DB保存', 'ok');
}

function importDBJSON() {
  try {
    const raw = document.getElementById('db-json').value.trim();
    if (!raw) { setStatus('❌ JSONを貼り付けてください', 'err'); return; }
    
    const jsonStart = raw.indexOf('{');
    const jsonEnd = raw.lastIndexOf('}');
    if (jsonStart < 0 || jsonEnd < 0) { setStatus('❌ JSONが正しくありません', 'err'); return; }
    
    const extracted = raw.substring(jsonStart, jsonEnd + 1);
    const parsed = JSON.parse(extracted);
    
    db = parsed;
    renderDBSection();
    renderTable();
    renderAnalysis();
    setStatus('✅ DB設定を読込', 'ok');
    document.getElementById('db-json').value = '';
  } catch (e) {
    setStatus('❌ JSONエラー', 'err');
  }
}

function exportDBJSON() {
  try {
    document.getElementById('db-json').value = JSON.stringify(db, null, 2);
    setStatus('✅ DB設定をJSON出力', 'ok');
  } catch (e) {
    setStatus('❌ エラー', 'err');
  }
}

function saveJSONWithName() {
  try {
    const name = document.getElementById('save-name').value.trim();
    if (!name) { setStatus('❌ レース名を入力', 'err'); return; }
    if (horses.length === 0) { setStatus('❌ 馬を読込してください', 'err'); return; }
    
    const horseJSON = JSON.stringify({ horses });
    const dbJSON = JSON.stringify(db);
    
    savedJsons[name] = {
      horses: horseJSON,
      db: dbJSON,
      savedAt: new Date().toLocaleString('ja-JP'),
      horseCount: horses.length
    };
    
    localStorage.setItem('kp_saved_jsons', JSON.stringify(savedJsons));
    renderSavedJsonList();
    document.getElementById('save-name').value = '';
    setStatus(`✅ 「${name}」を保存（出馬表+DB設定）`, 'ok');
  } catch (e) {
    setStatus('❌ 保存エラー', 'err');
  }
}

function renderSavedJsonList() {
  const list = document.getElementById('saved-list');
  const items = Object.entries(savedJsons).map(([name, data], i) => `
    <div style="background: #f0f8ff; border: 1px solid #2563eb; border-radius: 6px; padding: 8px; margin-bottom: 8px;">
      <div style="font-weight: 700; font-size: 10px; color: #2563eb; margin-bottom: 4px;">${name}</div>
      <div style="font-size: 8px; color: #6080a0; margin-bottom: 6px;">${data.horseCount}頭 | ${data.savedAt}</div>
      <div style="display: flex; gap: 4px;">
        <button class="btn btn-gold" style="flex: 1; padding: 4px; font-size: 8px;" onclick="loadSavedJSON('${name}')">📥 読込</button>
        <button class="btn btn-red" style="flex: 1; padding: 4px; font-size: 8px;" onclick="deleteSavedJSON('${name}')">✕ 削除</button>
      </div>
    </div>
  `).join('');
  
  list.innerHTML = items || '<div style="color: #999; font-size: 9px; padding: 10px; text-align: center;">保存済みレースなし</div>';
}

function loadSavedJSON(name) {
  try {
    const data = savedJsons[name];
    const horseData = JSON.parse(data.horses);
    const dbData = JSON.parse(data.db);
    
    document.getElementById('json-input').value = data.horses;
    document.getElementById('db-json').value = data.db;
    
    horses = horseData.horses || horseData;
    db = dbData;
    
    renderTable();
    renderDBSection();
    renderAnalysis();
    document.getElementById('count-badge').textContent = horses.length;
    
    setStatus(`✅ 「${name}」を読込（出馬表+DB設定）`, 'ok');
  } catch (e) {
    setStatus('❌ 読込エラー', 'err');
  }
}

function deleteSavedJSON(name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  delete savedJsons[name];
  localStorage.setItem('kp_saved_jsons', JSON.stringify(savedJsons));
  renderSavedJsonList();
  setStatus(`✅ 「${name}」を削除`, 'ok');
}

function addRecord() {
  const race = document.getElementById('record-race').value || '無名';
  const date = document.getElementById('record-date').value || new Date().toISOString().split('T')[0];
  const formation = document.getElementById('record-formation').value || '';
  const purchase = document.getElementById('record-purchase').value || '';
  const distance = document.getElementById('record-distance').value || '';
  const course = document.getElementById('record-course').value || '';
  const condition = document.getElementById('record-condition').value || '';
  const rank = document.getElementById('record-rank').value || '';
  const score = document.getElementById('record-score').value || '';
  const invest = parseInt(document.getElementById('record-invest').value) || 0;
  const ret = parseInt(document.getElementById('record-return').value) || 0;
  const memo = document.getElementById('record-memo').value;
  
  if (invest === 0) { setStatus('❌ 金額を入力', 'err'); return; }
  
  records.push({id: Date.now(), race, date, formation, purchase, distance, course, condition, rank, score, invest, return: ret, rate: (ret / invest * 100).toFixed(1), memo});
  localStorage.setItem('kp_records', JSON.stringify(records));
  renderRecordList();
  document.getElementById('record-race').value = '';
  document.getElementById('record-date').value = '';
  document.getElementById('record-formation').value = '';
  document.getElementById('record-purchase').value = '';
  document.getElementById('record-distance').value = '';
  document.getElementById('record-course').value = '';

function renderAnalysis() {
  const content = document.getElementById('analysis-content');
  if (horses.length === 0) { content.innerHTML = '<div style="padding: 20px; text-align: center; color: #aab0c0;">馬を読込してください</div>'; return; }
  
  const ranked = horses.map(h => {
    const trendScore = (db.jockey?.[h.jockey] || 0) + (db.sire?.[h.sire] || 0) + (db.age?.[h.age] || 0) + (db.kyakushitsu?.[h.kyakushitsu] || 0) + (db.ninki?.[h.ninki] || 0) + (db.maejun?.[h.maejun] || 0) + (db.maeclass?.[h.maeclass] || 0) + (db.waku?.[h.waku] || 0) + (db.timdev?.[h.timdev] || 0);
    const chokyoScore = ({'A': 10, 'B': 0, 'C': -15}[h.chokyoFinal] || 0) + ({'A': 10, 'B': 0, 'C': -15}[h.chokyoPrev] || 0);
    const commentScore = {'◎': 10, '◯': 5, '△': -5, '×': -15}[h.comment] || 0;
    const totalScore = trendScore + chokyoScore + commentScore;
    return {...h, trendScore, chokyoScore, commentScore, totalScore};
  }).sort((a, b) => b.totalScore - a.totalScore);

  // 偏差値計算
  const scores = ranked.map(h => h.totalScore);
  const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
  const variance = scores.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / scores.length;
  const stdev = Math.sqrt(variance);
  
  const calcHensaichi = (score) => {
    return stdev === 0 ? 50 : Math.round((score - avg) / stdev * 10 + 50) * 10 / 10;
  };
  
  const top1Score = ranked[0].totalScore;
  const top2Score = ranked[1]?.totalScore || 0;
  const top1Hensaichi = calcHensaichi(top1Score);
  const top2Hensaichi = calcHensaichi(top2Score);
  const dansoSa = top1Score - top2Score;
  
  // 鉄板判定
  let topLabel = '';
  if (top1Hensaichi >= 65) {
    topLabel = '🔥 鉄板レベル';
  } else if (top1Hensaichi >= 60) {
    topLabel = '✨ 有力候補';
  } else {
    topLabel = '⚠️ どんぐりの背比べ';
  }
  
  // 陣形判定＆推奨買い目
  const marukuHorses = ranked.filter(h => h.comment === '◎').map(h => `${h.banum}番`).join('・');
  const waideHorses = ranked.filter(h => h.comment === '△').map(h => `${h.banum}番`).join('・');
  const boxHorses = ranked.filter(h => ['◎', '◯', '△'].includes(h.comment)).map(h => `${h.banum}番`).join('・');
  
  let formation = '';
  let recommendation = '';
  let buyStyle = '';
  
  if (top1Score >= 50 && dansoSa >= 10) {
    formation = '【1強・不動陣形】';
    buyStyle = `《単勝 ${marukuHorses}》\n《ワイド ${marukuHorses} - ${waideHorses}》`;
    recommendation = '🔥 買い推奨！';
  } else if (top2Score >= 50 && dansoSa >= 5) {
    formation = '【2強・鉄板陣形】';
    buyStyle = `《馬連BOX ${boxHorses}》`;
    recommendation = '🔥 買い推奨！';
  } else if (top1Score >= 50 && dansoSa >= 5) {
    formation = '【1強・不動陣形】';
    buyStyle = `《馬連BOX ${boxHorses}》`;
    recommendation = '🔥 買い推奨！';
  } else if (top1Score < 40 && dansoSa >= 5) {
    formation = '【波乱・包囲陣形】';
    buyStyle = `《馬連BOX ${boxHorses}》`;
    recommendation = '⚠️ 高リスク';
  } else if (dansoSa >= 5) {
    formation = '【通常・標準陣形】';
    buyStyle = `《馬連BOX ${boxHorses}》`;
    recommendation = '💰 通常推奨';
  } else if (top2Score >= 50) {
    formation = '【2強・鉄板陣形（見送り推奨）】';
    buyStyle = `《単勝 ${marukuHorses}》\n《ワイド ${marukuHorses} - ${waideHorses}》`;
    recommendation = '🚫 見送り推奨';
  } else if (top1Score >= 50) {
    formation = '【1強・不動陣形（見送り推奨）】';
    buyStyle = `《単勝 ${marukuHorses}》\n《ワイド ${marukuHorses} - ${waideHorses}》`;
    recommendation = '🚫 見送り推奨';
  } else if (top1Score < 40) {
    formation = '【波乱・包囲陣形（見送り推奨）】';
    buyStyle = `《馬連BOX ${boxHorses}》`;
    recommendation = '🚫 見送り推奨';
  } else {
    formation = '【通常・標準陣形（見送り推奨）】';
    buyStyle = `《単勝 ${marukuHorses}》\n《ワイド ${marukuHorses} - ${waideHorses}》`;
    recommendation = '🚫 見送り推奨';
  }

  let html = '<table class="table" style="margin-bottom: 12px;"><thead style="background: #0f3460; color: #FFD700;"><tr><th>順</th><th>№</th><th>馬名</th><th>傾向</th><th>調</th><th>厩</th><th>計</th><th>ODD</th></tr></thead><tbody>';
  ranked.forEach((h, i) => {
    const bg = i < 3 ? ['#fffde6', '#fff8f0', '#f0fff4'][i] : '#fff';
    html += `<tr style="background: ${bg};"><td style="font-weight: 900; color: #e94560;">${i+1}</td><td>${h.banum}</td><td><strong>${h.name}</strong></td><td style="color: #2563eb; font-weight: 700;">${Math.round(h.trendScore)}</td><td style="color: #27ae60;">+${h.chokyoScore}</td><td style="color: #2563eb;">+${h.commentScore}</td><td style="color: #e94560; font-weight: 900;">${h.totalScore}</td><td>${h.odds.toFixed(1)}</td></tr>`;
  });
  html += '</tbody></table>';
  
  html += `
    <div style="padding: 12px; background: #fff8e6; border-radius: 6px; border-left: 4px solid #f39c12; margin-bottom: 10px; font-size: 11px; line-height: 1.6;">
      <div style="font-weight: 900; color: #f39c12; margin-bottom: 8px;">🏇 偏差値分析</div>
      <div style="margin-bottom: 6px; color: #1a1a2e;">
        <strong>🥇 1位偏差値： ${top1Hensaichi}</strong> ${topLabel}<br>
        <strong>🥈 2位偏差値： ${top2Hensaichi}</strong> 【上位断層： ${dansoSa}点】
      </div>
      <div style="background: #fff0e6; padding: 8px; border-radius: 4px; color: #d97706; font-weight: 700;">
        💡 司令室通信： ${recommendation}
      </div>
      <div style="margin-top: 8px; font-size: 9px; color: #6080a0;">
        レースレベル: ${stdev < 5 ? '🟡 混戦' : stdev < 10 ? '🟠 中程度' : '🔴 荒れる可能性あり'}
      </div>
    </div>
  `;
  
  // 陣形表示
  const formationColor = formation.includes('1強') ? '#e94560' : formation.includes('2強') ? '#2563eb' : formation.includes('波乱') ? '#f39c12' : '#3498db';
  const formationBg = formation.includes('1強') ? '#fdf0f5' : formation.includes('2強') ? '#f0f8ff' : formation.includes('波乱') ? '#fffaf0' : '#f0f9ff';
  
  html += `
    <div style="padding: 12px; background: ${formationBg}; border-radius: 6px; border-left: 4px solid ${formationColor}; margin-bottom: 10px;">
      <div style="font-weight: 900; font-size: 13px; color: ${formationColor}; margin-bottom: 8px;">${formation}</div>
      <div style="background: #fff; padding: 10px; border-radius: 4px; border: 1px solid ${formationColor}; margin-bottom: 8px; font-weight: 700; color: #1a1a2e; white-space: pre-line; font-size: 11px;">
        ${buyStyle}
      </div>
      <div style="text-align: center; font-weight: 900; font-size: 12px; color: ${formationColor};">${recommendation}</div>
    </div>
  `;
  
  html += `
    <div style="padding: 12px; background: #f0f4ff; border-radius: 6px; border-left: 4px solid #2563eb;">
      <strong style="font-size: 12px; color: #2563eb;">🎯 1位馬データ</strong><br>
      <small style="color: #6080a0;">
        ${ranked[0].banum}番 <strong>${ranked[0].name}</strong> | 
        スコア: ${ranked[0].totalScore}点 | 
        オッズ: ${ranked[0].odds.toFixed(1)}
      </small>
    </div>
  `;
  
  content.innerHTML = html;
}

function showLearningEngine() {
  const result = analyzeLearningPatterns();
  const div = document.getElementById('learning-result');
  
  if (result.patterns.length === 0) {
    div.innerHTML = '<div style="padding: 10px; background: #fff3cd; border-radius: 4px; color: #856404; font-size: 9px;">📊 データが足りません。3件以上の成績を記録してください。</div>';
    return;
  }
  
  let html = '<div style="padding: 12px; background: #e8f5e9; border-radius: 6px; border-left: 4px solid #4caf50;">';
  html += '<div style="font-weight: 900; color: #2e7d32; margin-bottom: 10px; font-size: 11px;">🧠 学習エンジン分析</div>';
  
  // パターンの表示
  result.patterns.forEach(pattern => {
    html += `<div style="font-size: 9px; color: #1b5e20; margin-bottom: 6px; padding: 6px; background: #fff; border-radius: 4px; border-left: 3px solid #4caf50;">✓ ${pattern}</div>`;
  });
  
  // 詳細データ：陣形別
  if (result.formationStats && Object.keys(result.formationStats).length > 0) {
    html += '<div style="margin-top: 12px; font-size: 9px; color: #1b5e20;"><strong>📊 陣形別的中率：</strong></div>';
    Object.entries(result.formationStats).forEach(([formation, stat]) => {
      const rate = stat.total > 0 ? (stat.hit / stat.total * 100).toFixed(1) : 0;
      const recovery = stat.totalInvest > 0 ? (stat.totalReturn / stat.totalInvest * 100).toFixed(1) : 0;
      html += `<div style="font-size: 8px; color: #333; margin-bottom: 4px; padding: 4px; background: #f5f5f5; border-radius: 3px;">
        ${formation}: 的中率${rate}% (${stat.hit}/${stat.total}) | 回収率${recovery}%
      </div>`;
    });
  }
  
  // 詳細データ：買い目別
  if (result.purchaseStats && Object.keys(result.purchaseStats).length > 0) {
    html += '<div style="margin-top: 12px; font-size: 9px; color: #1b5e20;"><strong>🎯 買い目別的中率：</strong></div>';
    Object.entries(result.purchaseStats).forEach(([purchase, stat]) => {
      const rate = stat.total > 0 ? (stat.hit / stat.total * 100).toFixed(1) : 0;
      const recovery = stat.totalInvest > 0 ? (stat.totalReturn / stat.totalInvest * 100).toFixed(1) : 0;
      html += `<div style="font-size: 8px; color: #333; margin-bottom: 4px; padding: 4px; background: #f5f5f5; border-radius: 3px;">
        ${purchase}: 的中率${rate}% (${stat.hit}/${stat.total}) | 回収率${recovery}%
      </div>`;
    });
  }
  
  // スコア帯別分析
  if (result.scoreStats && Object.keys(result.scoreStats).length > 0) {
    html += '<div style="margin-top: 12px; font-size: 9px; color: #1b5e20;"><strong>📈 偏差値帯別的中率：</strong></div>';
    const sortedScores = Object.entries(result.scoreStats).sort((a, b) => {
      const scoreA = parseInt(a[0].split('～')[0]);
      const scoreB = parseInt(b[0].split('～')[0]);
      return scoreB - scoreA;
    });
    sortedScores.forEach(([band, stat]) => {
      const rate = stat.total > 0 ? (stat.hit / stat.total * 100).toFixed(1) : 0;
      const recovery = stat.totalInvest > 0 ? (stat.totalReturn / stat.totalInvest * 100).toFixed(1) : 0;
      html += `<div style="font-size: 8px; color: #333; margin-bottom: 4px; padding: 4px; background: #f5f5f5; border-radius: 3px;">
        偏差値${band}: 的中率${rate}% (${stat.hit}/${stat.total}) | 回収率${recovery}%
      </div>`;
    });
  }
  
  // 推奨度インジケータ（※次のレースに適用する際の参考）
  html += '<div style="margin-top: 12px; font-size: 9px; color: #1b5e20;"><strong>🚀 推奨度ガイド（参考）：</strong></div>';

  html += '</div>';
  
  div.innerHTML = html;
}

// 学習エンジン：過去データから法則を抽出
function analyzeLearningPatterns() {
  if (records.length < 3) return { patterns: [], insight: '📊 データが足りません。3件以上の成績を記録してください。' };
  
  // 陣形別的中率分析
  const formationStats = {};
  records.forEach(r => {
    if (!r.formation) return;
    if (!formationStats[r.formation]) {
      formationStats[r.formation] = { total: 0, hit: 0, totalReturn: 0, totalInvest: 0 };
    }
    formationStats[r.formation].total++;
    formationStats[r.formation].totalInvest += r.invest;
    formationStats[r.formation].totalReturn += r.return;
    if (r.return > r.invest) {
      formationStats[r.formation].hit++;
    }
  });
  
  // 買い目別的中率分析
  const purchaseStats = {};
  records.forEach(r => {
    if (!r.purchase || r.purchase === '購入なし') return;
    if (!purchaseStats[r.purchase]) {
      purchaseStats[r.purchase] = { total: 0, hit: 0, totalReturn: 0, totalInvest: 0 };
    }
    purchaseStats[r.purchase].total++;
    purchaseStats[r.purchase].totalInvest += r.invest;
    purchaseStats[r.purchase].totalReturn += r.return;
    if (r.return > r.invest) {
      purchaseStats[r.purchase].hit++;
    }
  });
  
  // 距離別的中率分析
  const distanceStats = {};
  records.forEach(r => {
    if (!r.distance) return;
    if (!distanceStats[r.distance]) {
      distanceStats[r.distance] = { total: 0, hit: 0, totalReturn: 0, totalInvest: 0 };
    }
    distanceStats[r.distance].total++;
    distanceStats[r.distance].totalInvest += r.invest;
    distanceStats[r.distance].totalReturn += r.return;
    if (r.return > r.invest) {
      distanceStats[r.distance].hit++;
    }
  });
  
  // 馬場別的中率分析
  const conditionStats = {};
  records.forEach(r => {
    if (!r.condition) return;
    if (!conditionStats[r.condition]) {
      conditionStats[r.condition] = { total: 0, hit: 0, totalReturn: 0, totalInvest: 0 };
    }
    conditionStats[r.condition].total++;
    conditionStats[r.condition].totalInvest += r.invest;
    conditionStats[r.condition].totalReturn += r.return;
    if (r.return > r.invest) {
      conditionStats[r.condition].hit++;
    }
  });
  
  // 最強の陣形を検出
  let bestFormation = null, bestFormationRate = 0;
  Object.entries(formationStats).forEach(([form, stat]) => {
    const rate = stat.total > 0 ? stat.hit / stat.total : 0;
    if (rate > bestFormationRate) {
      bestFormationRate = rate;
      bestFormation = form;
    }
  });
  
  // 最強の買い目を検出
  let bestPurchase = null, bestPurchaseRate = 0;
  Object.entries(purchaseStats).forEach(([purch, stat]) => {
    const rate = stat.total > 0 ? stat.hit / stat.total : 0;
    if (rate > bestPurchaseRate) {
      bestPurchaseRate = rate;
      bestPurchase = purch;
    }
  });
  
  const patterns = [];
  if (bestFormation) {
    patterns.push(`📊 陣形「${bestFormation}」が最強：的中率${(bestFormationRate * 100).toFixed(1)}%（${formationStats[bestFormation].hit}/${formationStats[bestFormation].total}）`);
  }
  if (bestPurchase) {
    patterns.push(`🎯 買い目「${bestPurchase}」が最強：的中率${(bestPurchaseRate * 100).toFixed(1)}%（${purchaseStats[bestPurchase].hit}/${purchaseStats[bestPurchase].total}）`);
  }
  
  const totalInvest = records.reduce((a, b) => a + b.invest, 0);
  const totalReturn = records.reduce((a, b) => a + b.return, 0);
  const overallRate = totalInvest > 0 ? totalReturn / totalInvest : 0;
  patterns.push(`💰 総合回収率：${(overallRate * 100).toFixed(1)}%`);
  
  // スコア帯別分析
  const scoreStats = {};
  records.forEach(r => {
    if (!r.score) return;
    const score = parseInt(r.score);
    // スコアを10刻みでグルーピング
    const band = Math.floor(score / 10) * 10 + '～' + (Math.floor(score / 10) * 10 + 9);
    if (!scoreStats[band]) {
      scoreStats[band] = { total: 0, hit: 0, totalReturn: 0, totalInvest: 0 };
    }
    scoreStats[band].total++;
    scoreStats[band].totalInvest += r.invest;
    scoreStats[band].totalReturn += r.return;
    if (r.return > r.invest) {
      scoreStats[band].hit++;
    }
  });
  
  return { formationStats, purchaseStats, distanceStats, conditionStats, scoreStats, patterns };
}
